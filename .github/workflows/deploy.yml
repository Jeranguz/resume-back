name: Lambda Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name : Configure aws credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          audience: sts.amazonaws.com
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::182498323846:role/github-actions-backend
      - name: Zip Lambda function
        run: zip lambda_function.zip lambda_function.py
      - name: Deploy to AWS Lambda
        run: aws lambda update-function-code --function-name increaseCounter --zip-file fileb://lambda_function.zip
